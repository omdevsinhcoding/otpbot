<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Access Restricted</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0e1a;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(120, 80, 255, 0.15), transparent),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255, 50, 120, 0.1), transparent);
      color: #e0e0f0;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 420px;
      animation: fadeIn 0.8s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .shield {
      width: 120px; height: 120px;
      margin: 0 auto 2rem;
      position: relative;
    }
    .shield-icon {
      font-size: 80px;
      filter: drop-shadow(0 0 30px rgba(120, 80, 255, 0.4));
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.05); }
    }
    .glow-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 140px; height: 140px;
      border-radius: 50%;
      border: 2px solid rgba(120, 80, 255, 0.2);
      animation: ringPulse 3s ease-in-out infinite;
    }
    @keyframes ringPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
      50%      { transform: translate(-50%, -50%) scale(1.15); opacity: 0; }
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 0.95rem;
      color: rgba(224, 224, 240, 0.6);
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: white;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(124, 58, 237, 0.4);
    }
    .dots {
      position: fixed;
      width: 100%; height: 100%;
      top: 0; left: 0;
      pointer-events: none;
      z-index: -1;
    }
    .dot {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(120, 80, 255, 0.15);
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-20px); }
    }
  </style>
</head>
<body>
  <div class="dots" id="dots"></div>
  <div class="container">
    <div class="shield">
      <div class="glow-ring"></div>
      <div class="shield-icon">🛡️</div>
    </div>
    <h1>Access Restricted</h1>
    <p>This dashboard is only accessible through the Telegram Bot. Please open it from inside the bot.</p>
    <a class="btn" href="https://t.me/" target="_blank">
      <span>💬</span> Open Telegram
    </a>
  </div>
  <script>
    // Floating particles
    const dots = document.getElementById('dots');
    for (let i = 0; i < 30; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      d.style.left = Math.random() * 100 + '%';
      d.style.top = Math.random() * 100 + '%';
      d.style.animationDelay = Math.random() * 6 + 's';
      d.style.animationDuration = (4 + Math.random() * 4) + 's';
      dots.appendChild(d);
    }
  </script>
</body>
</html>
