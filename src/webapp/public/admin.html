<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin Analytics</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/css/admin.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>.hidden { display: none !important; }</style>
</head>
<body>
  <!-- ── LOADING STATE ─────────────────────────────────────── -->
  <div class="app" id="loading">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Authenticating…</div>
    </div>
  </div>

  <!-- ── DASHBOARD (hidden until loaded) ───────────────────── -->
  <div class="app hidden" id="dashboard">

    <!-- Header -->
    <header class="header animate-in">
      <div class="header-left">
        <div class="header-avatar">📊</div>
        <div>
          <div class="header-title" id="admin-name">Admin</div>
          <div class="header-subtitle">Analytics Dashboard</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="refresh-dot"></div>
        <div class="header-badge">LIVE</div>
      </div>
    </header>

    <!-- ── Stat Cards ──────────────────────────────────────── -->
    <div class="stats-grid">
      <div class="stat-card purple animate-in delay-1">
        <span class="stat-icon">👥</span>
        <div class="stat-label">Total Users</div>
        <div class="stat-value purple" id="total-users">—</div>
      </div>
      <div class="stat-card blue animate-in delay-2">
        <span class="stat-icon">🆕</span>
        <div class="stat-label">Today Users</div>
        <div class="stat-value blue" id="today-users">—</div>
        <span class="stat-change up" id="today-users-change"></span>
      </div>
      <div class="stat-card green animate-in delay-2">
        <span class="stat-icon">💰</span>
        <div class="stat-label">Today Deposits</div>
        <div class="stat-value green" id="today-deposits">—</div>
        <span class="stat-change up" id="today-deposits-change"></span>
      </div>
      <div class="stat-card pink animate-in delay-3">
        <span class="stat-icon">💎</span>
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value pink" id="total-revenue">—</div>
      </div>
      <div class="stat-card orange animate-in delay-3">
        <span class="stat-icon">⚡</span>
        <div class="stat-label">Active Users</div>
        <div class="stat-value orange" id="active-users">—</div>
      </div>
      <div class="stat-card purple animate-in delay-4">
        <span class="stat-icon">🎁</span>
        <div class="stat-label">Total Referrals</div>
        <div class="stat-value purple" id="total-referrals">—</div>
      </div>
    </div>

    <!-- ── 7-Day Deposits Chart ────────────────────────────── -->
    <div class="section animate-in delay-4">
      <div class="section-header">
        <div class="section-title">📈 Deposit Trend</div>
        <div class="section-badge">7 Days</div>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <div>
            <div class="chart-total" id="chart-total">₹0</div>
            <div class="chart-label">Total 7-Day Deposits</div>
          </div>
          <div class="chart-period">Last 7 Days</div>
        </div>
        <div class="chart-bars" id="chart-bars">
          <!-- Bars injected by JS -->
        </div>
      </div>
    </div>

    <!-- ── Quick Stats ─────────────────────────────────────── -->
    <div class="section animate-in delay-5">
      <div class="section-header">
        <div class="section-title">⚡ Quick Overview</div>
      </div>
      <div class="activity-list" id="activity-list">
        <!-- Items injected by JS -->
      </div>
    </div>

    <!-- Footer -->
    <div class="footer animate-in delay-5">
      Powered by your Bot · Auto-refreshes every 30s
    </div>

  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
